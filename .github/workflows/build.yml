name: Build and Release

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: |
          make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cognized
          path: build/cognized

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cognized

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: cognized
          body: 'Cognize AI Agent Blockchain Binary'
