syntax = "proto3";

package axon.oracle.v1;

option go_package = "github.com/cognize/axon/x/oracle/types";

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

message Params {
  uint64 min_reporters = 1;
  uint64 update_interval = 2;
  bytes reporter_bond = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  bytes slash_threshold = 4 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  bytes reporter_bond_slash = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  bytes missed_report_penalty = 6 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

message OracleFeed {
  string feed_id = 1;
  string description = 2;
  string last_price = 3;
  uint64 last_updated = 4;
}

message OracleReport {
  string feed_id = 1;
  uint64 height = 2;
  string price = 3;
  string reporter = 4;
}

message Reporter {
  string address = 1;
  cosmos.base.v1beta1.Coin bond = 2 [(gogoproto.nullable) = false];
  bool active = 3;
  uint64 missed_reports = 4;
}
