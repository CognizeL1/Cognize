syntax = "proto3";

package axon.oracle.v1;

option go_package = "github.com/cognize/axon/x/oracle/types";

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

message MsgRegisterReporter {
  string sender = 1;
  cosmos.base.v1beta1.Coin bond = 2 [(gogoproto.nullable) = false];
}

message MsgRegisterReporterResponse {
  bool success = 1;
}

message MsgSubmitReport {
  string sender = 1;
  string feed_id = 2;
  string price = 3;
  uint64 height = 4;
}

message MsgSubmitReportResponse {
  bool success = 1;
}

message MsgUpdateFeed {
  string sender = 1;
  string feed_id = 2;
}

message MsgUpdateFeedResponse {
  bool success = 1;
}
